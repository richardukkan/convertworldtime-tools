.divider { height: 1px; background: #e4eff7; margin: 18px 0; }
#results { max-width: 1060px; margin: 0 auto; display: none; }

.planet-table td { padding: 7px 8px; border-bottom: 1px solid #f0f6fb; }

// ── ASTRONOMY ────────────────────────────────────────────────────────
function jd(Y,M,D,h){
  if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+D+B-1524.5+h/24;
}

function sunPos(T){
  const L0=norm(280.46646+36000.76983*T+0.0003032*T*T);
  const M=norm(357.52911+35999.05029*T-0.0001537*T*T);
  const Mr=M*D2R;
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const Om=norm(125.04-1934.136*T);
  return{lon:norm(L0+C-0.00569-0.00478*Math.sin(Om*D2R)),retro:false};
}

function moonPos(T){
  const L0=norm(218.3164477+481267.88123421*T-0.0015786*T*T);
  const M=norm(357.52772+35999.05034*T);
  const Mp=norm(134.96298+477198.867398*T+0.0086972*T*T);
  const D=norm(297.85036+445267.11480*T-0.0019142*T*T);
  const F=norm(93.27191+483202.017538*T-0.0036825*T*T);
  const Mr=M*D2R,Mpr=Mp*D2R,Dr=D*D2R,Fr=F*D2R;
  const E=1-0.002516*T-0.0000074*T*T;
  const SL=(6288774*Math.sin(Mpr)+1274027*Math.sin(2*Dr-Mpr)+658314*Math.sin(2*Dr)
    +213618*Math.sin(2*Mpr)-185116*E*Math.sin(Mr)-114332*Math.sin(2*Fr)
    +58793*Math.sin(2*Dr-2*Mpr)+57066*E*Math.sin(2*Dr-Mr-Mpr)
    +53322*Math.sin(2*Dr+Mpr)+45758*E*Math.sin(2*Dr-Mr)+41775*Math.sin(Mpr-Mr)
    -34720*Math.sin(Dr)-30403*Math.sin(Mpr+Mr)+15327*Math.sin(2*Dr-2*Fr)
    -12528*Math.sin(Mpr+2*Fr)+10980*Math.sin(Mpr-2*Fr)+10675*Math.sin(4*Dr-Mpr)
    +10034*Math.sin(3*Mpr)+8548*Math.sin(4*Dr-2*Mpr)
    -7888*E*Math.sin(2*Dr+Mr-Mpr)-6766*E*Math.sin(2*Dr+Mr)
    -5163*Math.sin(Dr-Mpr)+4987*E*Math.sin(Dr+Mr)
    +4036*E*Math.sin(2*Dr-Mr+Mpr)+3994*Math.sin(2*Dr+2*Mpr)
    +3861*Math.sin(4*Dr)+3665*Math.sin(2*Dr-3*Mpr))*1e-6;
  return{lon:norm(L0+SL),retro:false};
}

function kepler(M_deg,e){
  let E=M_deg*D2R; const Mr=E;
  for(let i=0;i<15;i++){const dE=(Mr-E+e*Math.sin(E))/(1-e*Math.cos(E));E+=dE;if(Math.abs(dE)<1e-10)break;}
  return E;
}

function helio(name,T){
  const el=OE[name];
  const L=norm(el[0]+el[1]*T), a=el[2], e=el[3]+el[4]*T;
  const i=el[5]+el[6]*T, O=norm(el[7]+el[8]*T), w=norm(el[9]+el[10]*T);
  const omega=norm(w-O), M=norm(L-w);
  const E=kepler(M,e);
  const v=2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2))*R2D;
  const r=a*(1-e*Math.cos(E));
  const u=norm(v+omega), ur=u*D2R, ir=i*D2R, Or=O*D2R;
  const x=r*(Math.cos(Or)*Math.cos(ur)-Math.sin(Or)*Math.sin(ur)*Math.cos(ir));
  const y=r*(Math.sin(Or)*Math.cos(ur)+Math.cos(Or)*Math.sin(ur)*Math.cos(ir));
  const z=r*Math.sin(ur)*Math.sin(ir);
  return{x,y,z};
}

function geoLon(name,T){
  if(name==='Sun') return sunPos(T);
  if(name==='Moon') return moonPos(T);
  if(name==='NNode') return{lon:norm(125.04452-1934.136261*T+0.0020708*T*T),retro:true};
  const p=helio(name,T), e=helio('Earth',T);
  const dx=p.x-e.x, dy=p.y-e.y;
  const lon=norm(Math.atan2(dy,dx)*R2D);
  const p2=helio(name,T+0.5/36525), e2=helio('Earth',T+0.5/36525);
  const lon2=norm(Math.atan2(p2.y-e2.y,p2.x-e2.x)*R2D);
  let df=lon2-lon; if(df>180)df-=360; if(df<-180)df+=360;
  return{lon,retro:df<0};
}

function calcASC(JD,lat,lon){
  const T=(JD-2451545)/36525;
  const GMST=norm(280.46061837+360.98564736629*(JD-2451545)+0.000387933*T*T-T*T*T/38710000);
  const LST=norm(GMST+lon);
  const eps=23.439291111-0.013004167*T;
  const er=eps*D2R, lr=lat*D2R, LSTr=LST*D2R;
  let MC=Math.atan2(Math.sin(LSTr),Math.cos(LSTr)*Math.cos(er))*R2D;
  MC=norm(MC);
  let md=MC-LST; if(md>180)md-=360; if(md<-180)md+=360;
  if(Math.abs(md)>90) MC=norm(MC+180);
  const y2=-Math.cos(LSTr), x2=Math.sin(er)*Math.tan(lr)+Math.cos(er)*Math.sin(LSTr);
  let ASC=Math.atan2(y2,x2)*R2D; ASC=norm(ASC);
  const ae=norm(LST+90); let ad=ASC-ae; if(ad>180)ad-=360; if(ad<-180)ad+=360;
  if(Math.abs(ad)>90) ASC=norm(ASC+180);
  return{ASC,MC};
}

function signInfo(lon){
  const i=Math.floor(lon/30); return{sign:SIGNS[i],deg:lon-i*30,idx:i};
}

// ── SVG CHART ────────────────────────────────────────────────────────
function pt(lon,asc,r){
  const a=Math.PI-(lon-asc)*D2R;
  return{x:230+r*Math.cos(a), y:230+r*Math.sin(a)};
}

function drawChart(planets,ASC,MC){
  const cx=230,cy=230,Ro=218,Rzi=178,Rhi=138,Rp=120,Ra=95;
  let s='';

  // Zodiac ring segments
  for(let i=0;i<12;i++){
    const a1=Math.PI-(i*30-ASC)*D2R;
    const a2=Math.PI-((i+1)*30-ASC)*D2R;
    const col=EL_COL[SIGNS[i].e], stk=EL_STK[SIGNS[i].e];
    const x1o=cx+Ro*Math.cos(a1),y1o=cy+Ro*Math.sin(a1);
    const x2o=cx+Ro*Math.cos(a2),y2o=cy+Ro*Math.sin(a2);
    const x1i=cx+Rzi*Math.cos(a1),y1i=cy+Rzi*Math.sin(a1);
    const x2i=cx+Rzi*Math.cos(a2),y2i=cy+Rzi*Math.sin(a2);
    s+=`<path d="M${x1o},${y1o} A${Ro},${Ro} 0 0,0 ${x2o},${y2o} L${x2i},${y2i} A${Rzi},${Rzi} 0 0,1 ${x1i},${y1i} Z" fill="${col}" stroke="${stk}" stroke-width="0.8"/>`;
    // Sign symbol at midpoint
    const am=Math.PI-((i*30+15)-ASC)*D2R;
    const rm=(Ro+Rzi)/2;
    s+=`<text x="${cx+rm*Math.cos(am)}" y="${cy+rm*Math.sin(am)}" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4a6a85">${SIGNS[i].s}</text>`;
    // Divider lines
    s+=`<line x1="${x1o}" y1="${y1o}" x2="${x1i}" y2="${y1i}" stroke="${stk}" stroke-width="0.8"/>`;
  }

  // Circles
  s+=`<circle cx="${cx}" cy="${cy}" r="${Ro}" fill="none" stroke="#c8dcea" stroke-width="1"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${Rzi}" fill="none" stroke="#c8dcea" stroke-width="1"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${Rhi}" fill="none" stroke="#e4eff7" stroke-width="0.8"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${Ra}" fill="white" stroke="#e4eff7" stroke-width="1"/>`;

  // House dividers (Whole Sign — same as sign lines but inner)
  const h1=Math.floor(ASC/30);
  for(let i=0;i<12;i++){
    const hLon=((h1+i)%12)*30;
    const a=Math.PI-(hLon-ASC)*D2R;
    const isAngle=(i===0||i===3||i===6||i===9);
    const p1={x:cx+Rzi*Math.cos(a),y:cy+Rzi*Math.sin(a)};
    const p2={x:cx+Rhi*Math.cos(a),y:cy+Rhi*Math.sin(a)};
    s+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isAngle?'#3b8fd4':'#c8dcea'}" stroke-width="${isAngle?1.5:0.7}"/>`;
    // House numbers
    const hm=norm(hLon+15);
    const pm=pt(hm,ASC,(Rzi+Rhi)/2);
    s+=`<text x="${pm.x}" y="${pm.y}" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#90afc5">${i+1}</text>`;
  }

  // ASC–DSC line
  const a1p=pt(ASC,ASC,Rzi); const d1p=pt(norm(ASC+180),ASC,Rzi);
  s+=`<line x1="${a1p.x}" y1="${a1p.y}" x2="${d1p.x}" y2="${d1p.y}" stroke="#1a2533" stroke-width="1.5" opacity="0.4"/>`;
  // MC–IC line
  const mc1=pt(MC,ASC,Rzi); const ic1=pt(norm(MC+180),ASC,Rzi);
  s+=`<line x1="${mc1.x}" y1="${mc1.y}" x2="${ic1.x}" y2="${ic1.y}" stroke="#4a6a85" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>`;

  // Axis labels
  const al=pt(ASC,ASC,Rzi-13); s+=`<text x="${al.x}" y="${al.y}" text-anchor="middle" dominant-baseline="central" font-size="7" font-weight="bold" fill="#1a2533">ASC</text>`;
  const dl=pt(norm(ASC+180),ASC,Rzi-13); s+=`<text x="${dl.x}" y="${dl.y}" text-anchor="middle" dominant-baseline="central" font-size="7" font-weight="bold" fill="#1a2533">DSC</text>`;
  const ml=pt(MC,ASC,Rzi-13); s+=`<text x="${ml.x}" y="${ml.y}" text-anchor="middle" dominant-baseline="central" font-size="7" font-weight="bold" fill="#4a6a85">MC</text>`;
  const il=pt(norm(MC+180),ASC,Rzi-13); s+=`<text x="${il.x}" y="${il.y}" text-anchor="middle" dominant-baseline="central" font-size="7" fill="#90afc5">IC</text>`;

  // Aspect lines in center
  const mainP=planets.filter(p=>['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn'].includes(p.n));
  for(let i=0;i<mainP.length;i++){
    for(let j=i+1;j<mainP.length;j++){
      let diff=Math.abs(mainP[i].lon-mainP[j].lon);
      if(diff>180)diff=360-diff;
      for(const asp of ASPECTS){
        if(Math.abs(diff-asp.d)<=asp.orb){
          const pa=pt(mainP[i].lon,ASC,Ra-4), pb=pt(mainP[j].lon,ASC,Ra-4);
          s+=`<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="${asp.c}" stroke-width="0.7" opacity="0.45"/>`;
          break;
        }
      }
    }
  }

  // Planet positions — stagger overlapping
  const sorted=[...planets].sort((a,b)=>a.lon-b.lon);
  const offsets=new Array(planets.length).fill(0);
  for(let i=0;i<sorted.length;i++){
    for(let j=i+1;j<sorted.length;j++){
      let diff=Math.abs(sorted[i].lon-sorted[j].lon);
      if(diff>180)diff=360-diff;
      if(diff<7) offsets[j]=(offsets[j]||0)+14;
    }
  }

  for(let i=0;i<sorted.length;i++){
    const p=sorted[i];
    const pd=PDATA.find(x=>x.n===p.n);
    const radius=Rp-offsets[i];
    const pp=pt(p.lon,ASC,radius);
    s+=`<circle cx="${pp.x}" cy="${pp.y}" r="10" fill="white" stroke="${pd.c}" stroke-width="1.5"/>`;
    s+=`<text x="${pp.x}" y="${pp.y}" text-anchor="middle" dominant-baseline="central" font-size="11" fill="${pd.c}">${pd.s}</text>`;
  }

  return s;
}

// ── MAIN FUNCTION ────────────────────────────────────────────────────
function calculate(){
  const day=parseInt(document.getElementById('bDay').value)||0;
  const mon=parseInt(document.getElementById('bMonth').value)||0;
  const yr=parseInt(document.getElementById('bYear').value)||0;
  const tv=document.getElementById('bTime').value;
  const cv=document.getElementById('bCity').value.trim().toLowerCase();
  document.getElementById('cityErr').style.display='none';
  if(!day||!mon||!yr||!tv){alert('Please enter a complete birth date and time.');return;}
  if(yr<1800||yr>2099){alert('Please enter a valid year between 1800 and 2099.');return;}
  const city=CITIES[cv];
  if(!city){document.getElementById('cityErr').style.display='block';return;}

  // Build ISO string: YYYY-MM-DDTHH:MM — explicit, no locale ambiguity
  const pad=n=>String(n).padStart(2,'0');
  const dv=`${yr}-${pad(mon)}-${pad(day)}`;
  // Local → UTC
  const dt=DateTime.fromISO(`${dv}T${tv}`,{zone:city.z});
  const ut=dt.toUTC();
  const JD=jd(ut.year,ut.month,ut.day,ut.hour+ut.minute/60+ut.second/3600);
  const T=(JD-2451545)/36525;

  // Planet positions
  const planets=PDATA.map(pd=>({n:pd.n,...geoLon(pd.n,T)}));

  // ASC & MC
  const{ASC,MC}=calcASC(JD,city.la,city.lo);

  // Whole Sign houses — House 1 = sign containing ASC
  const h1Sign=Math.floor(ASC/30);

  // Big Three
  const sun=planets.find(p=>p.n==='Sun');
  const moon=planets.find(p=>p.n==='Moon');
  const si=signInfo(sun.lon), mi=signInfo(moon.lon), ai=signInfo(ASC);
  document.getElementById('bigThree').innerHTML=`
    <div class="big-three-item"><div class="big-three-label">☉ Sun Sign</div>
      <div class="big-three-value">${si.sign.s} ${si.sign.n}</div><div class="big-three-deg">${si.deg.toFixed(1)}°</div></div>
    <div class="big-three-item"><div class="big-three-label">☽ Moon Sign</div>
      <div class="big-three-value">${mi.sign.s} ${mi.sign.n}</div><div class="big-three-deg">${mi.deg.toFixed(1)}°</div></div>
    <div class="big-three-item" style="border-top-color:#1a2533"><div class="big-three-label">↑ Rising Sign</div>
      <div class="big-three-value">${ai.sign.s} ${ai.sign.n}</div><div class="big-three-deg">${ai.deg.toFixed(1)}°</div></div>`;

  // SVG Chart
  document.getElementById('chartSVG').innerHTML=drawChart(planets,ASC,MC);

  // Planet Table
  let th=`<tr><th>Planet</th><th>Sign</th><th>Deg°</th><th>House</th></tr>`;
  for(const p of planets){
    const pd=PDATA.find(x=>x.n===p.n);
    const si2=signInfo(p.lon);
    const house=((si2.idx-h1Sign+12)%12)+1;
    th+=`<tr><td><span style="color:${pd.c};font-size:14px">${pd.s}</span> ${p.n}</td>
      <td><span class="sign-pill">${si2.sign.s} ${si2.sign.n}</span>${p.retro?'<span class="retro">℞</span>':''}</td>
      <td>${si2.deg.toFixed(1)}°</td><td>${house}</td></tr>`;
  }
  // Add ASC & MC rows
  const ascI=signInfo(ASC), mcI=signInfo(MC);
  th+=`<tr><td><strong>↑ ASC</strong></td><td><span class="sign-pill">${ascI.sign.s} ${ascI.sign.n}</span></td><td>${ascI.deg.toFixed(1)}°</td><td>—</td></tr>`;
  th+=`<tr><td><strong>MC</strong></td><td><span class="sign-pill">${mcI.sign.s} ${mcI.sign.n}</span></td><td>${mcI.deg.toFixed(1)}°</td><td>—</td></tr>`;
  document.getElementById('ptable').innerHTML=th;

  // Aspects
  const aspPlanets=planets.filter(p=>p.n!=='NNode');
  const found=[];
  for(let i=0;i<aspPlanets.length;i++){
    for(let j=i+1;j<aspPlanets.length;j++){
      let diff=Math.abs(aspPlanets[i].lon-aspPlanets[j].lon);
      if(diff>180)diff=360-diff;
      for(const asp of ASPECTS){
        const orb=Math.abs(diff-asp.d);
        if(orb<=asp.orb){found.push({p1:aspPlanets[i],p2:aspPlanets[j],asp,orb});break;}
      }
    }
  }
  const aspDiv=document.getElementById('aspDiv');
  if(!found.length){aspDiv.innerHTML='<div style="color:#90afc5;font-size:13px;padding:6px 0">No major aspects found.</div>';}
  else{
    aspDiv.innerHTML=found.sort((a,b)=>a.orb-b.orb).map(a=>{
      const p1d=PDATA.find(x=>x.n===a.p1.n), p2d=PDATA.find(x=>x.n===a.p2.n);
      return`<div class="asp-row">
        <div class="asp-dot" style="background:${a.asp.c}"></div>
        <span style="color:${p1d.c}">${p1d.s}</span>
        <span style="font-size:11px;color:#4a6a85">${a.p1.n}</span>
        <strong style="color:${a.asp.c};font-size:11px">${a.asp.n}</strong>
        <span style="color:${p2d.c}">${p2d.s}</span>
        <span style="font-size:11px;color:#4a6a85">${a.p2.n}</span>
        <span class="asp-orb">${a.orb.toFixed(1)}°</span>
      </div>`;
    }).join('');
  }

  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}

// Populate day dropdown
(function(){
  const dayEl=document.getElementById('bDay');
  const monEl=document.getElementById('bMonth');
  for(let d=1;d<=31;d++){const o=document.createElement('option');o.value=d;o.textContent=String(d).padStart(2,'0');dayEl.appendChild(o);}
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  months.forEach((m,i)=>{const o=document.createElement('option');o.value=i+1;o.textContent=m;monEl.appendChild(o);});
  // Defaults: 30 years ago
  const def=new Date();
  dayEl.value=def.getDate();
  monEl.value=def.getMonth()+1;
  document.getElementById('bYear').value=def.getFullYear()-30;
  document.getElementById('bTime').value='12:00';
})();
</script>
